<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ten. — Stories and ideas for busy people</title>
<meta name="description" content="Short stories, quick lessons, and bold ideas you can read or listen to in 10 minutes.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F2;--bg2:#F2EDE5;--card:#FFFFFF;--text:#1A1A1A;--text2:#6B5E50;
  --accent:#C45D3E;--accent-light:#F4E8E3;--accent-dark:#A34830;
  --border:#E8E0D6;--tag:#EDE7DF;--green:#2D6A4F;--green-light:#E9F5EE;
  --purple:#6B4FA0;--purple-light:#F0ECF9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
::selection{background:var(--accent-light)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}

/* Layout */
.container{max-width:640px;margin:0 auto;padding:0 20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 8px;position:sticky;top:0;background:var(--bg);z-index:50}
.logo{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:800;letter-spacing:-.02em;cursor:pointer}
.logo .dot{color:var(--accent)}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-outline{background:none;border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-solid{background:var(--accent);border:none;border-radius:10px;padding:8px 14px;cursor:pointer;color:#fff;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-solid:hover{background:var(--accent-dark)}
.tagline{font-size:14px;color:var(--text2);padding-bottom:24px;font-weight:500}

/* Featured */
.featured{background:linear-gradient(135deg,var(--text) 0%,#2C2420 100%);border-radius:20px;padding:24px 22px;margin-bottom:24px;cursor:pointer;position:relative;overflow:hidden;transition:all .25s}
.featured:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.2)}
.featured-glow{position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(196,93,62,.12)}
.featured-badge{display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.featured h2{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.25}
.featured .author{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:6px;font-weight:500}
.featured .excerpt{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:16px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.featured .meta{display:flex;gap:16px;font-size:13px;align-items:center}
.featured .meta .rm{color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px}
.featured .meta .lm{color:var(--accent);display:flex;align-items:center;gap:5px;font-weight:600}
.featured .meta .social{margin-left:auto;display:flex;gap:12px;font-size:12px;color:rgba(255,255,255,.5)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.filter{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.filter.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* Cards */
.cards{display:flex;flex-direction:column;gap:14px;padding-bottom:40px}
.card{background:var(--card);border-radius:16px;padding:22px 20px;cursor:pointer;border:1px solid var(--border);transition:all .25s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:20px}
.cat-story{color:var(--accent);background:#FDF2E9;border:1px solid #F5D5C3}
.cat-learn{color:var(--green);background:#E9F5F0;border:1px solid #C3E6D5}
.cat-idea{color:var(--purple);background:#F0ECF9;border:1px solid #D5C8ED}
.card h3{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3}
.card .author{font-size:13px;color:var(--text2);margin-bottom:14px;font-weight:500}
.card .excerpt{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:12px;font-size:13px;font-weight:500;align-items:center;flex-wrap:wrap}
.card-meta .rm{color:var(--text2);display:flex;align-items:center;gap:4px}
.card-meta .lm{color:var(--green);display:flex;align-items:center;gap:4px;font-weight:600}
.card-meta .engagement{margin-left:auto;display:flex;gap:10px;font-size:12px;color:var(--text2)}
.like-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif;padding:0;transition:all .2s}
.like-btn:hover,.like-btn.liked{color:var(--accent)}

/* Reading View */
.reading-view{display:none;min-height:100vh}
.reading-header{display:flex;align-items:center;padding:20px 0 16px;gap:12px;position:sticky;top:0;background:var(--bg);z-index:10}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text);padding:4px;display:flex}
.mode-toggle{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px;margin-left:auto}
.mode-btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}
.mode-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mode-btn:not(.active){background:transparent;color:var(--text2)}
.reading-tags{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:600;color:var(--text2);background:var(--tag);padding:4px 10px;border-radius:20px}
.reading-view h1{font-family:'Playfair Display',Georgia,serif;font-size:32px;font-weight:800;margin-bottom:10px;line-height:1.2}
.reading-author{font-size:15px;color:var(--text2);margin-bottom:8px;font-weight:500}
.reading-meta{display:flex;gap:16px;margin-bottom:8px;font-size:13px;color:var(--text2);align-items:center}
.reading-meta .lm{color:var(--green)}

/* Social bar */
.social-bar{display:flex;align-items:center;gap:20px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:8px 0 4px}
.social-bar button{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);font-family:'DM Sans',sans-serif;font-weight:500;padding:6px 0;transition:all .2s}
.social-bar button:hover{color:var(--accent)}
.social-bar button.liked{color:var(--accent)}
.social-bar .ct{font-size:13px;color:var(--text2)}

/* Share menu */
.share-menu{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.share-menu.open{display:flex;flex-wrap:wrap;gap:6px}
.share-menu button{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--card);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex:1;min-width:calc(50% - 3px)}
.share-menu button:hover{border-color:var(--accent);background:var(--accent-light)}

/* Audio player */
.audio-player{background:var(--text);border-radius:16px;padding:16px 20px;display:none;align-items:center;gap:14px;margin:16px 0}
.play-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s}
.play-btn:hover{transform:scale(1.08)}
.progress-wrap{flex:1}
.progress-track{height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin-bottom:6px;overflow:hidden;cursor:pointer}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s linear;width:0%}
.progress-times{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.5)}

/* Reading body */
.reading-body{font-family:'Source Serif 4',Georgia,serif;font-size:17.5px;line-height:1.8;padding:12px 0 24px}
.reading-body p{margin-bottom:20px}

/* Comments */
.comments-section{padding:24px 0 80px}
.comments-header{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.comments-header span{font-size:13px;font-weight:500;color:var(--text2)}
.comment{display:flex;gap:12px;margin-bottom:20px}
.comment-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.comment-body{flex:1}
.comment-name{font-size:13px;font-weight:700}
.comment-time{font-size:11px;color:var(--text2);margin-left:8px;font-weight:400}
.comment-text{font-size:14px;line-height:1.5;margin-top:4px}
.comment-actions{display:flex;gap:16px;margin-top:6px}
.comment-actions button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif;padding:0;transition:color .2s}
.comment-actions button:hover{color:var(--accent)}
.add-comment{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.add-comment input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--card);color:var(--text)}
.add-comment input:focus{border-color:var(--accent)}
.add-comment input::placeholder{color:#B5A99A}
.add-comment button{padding:10px 18px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* Write View */
.write-view{display:none;min-height:100vh}
.write-desc{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}
.cat-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:8px;display:block}
.cat-btns{display:flex;gap:8px;margin-bottom:20px}
.cat-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.title-input{width:100%;padding:14px 0;border:none;border-bottom:2px solid var(--border);background:transparent;font-size:24px;font-family:'Playfair Display',Georgia,serif;font-weight:700;color:var(--text);outline:none;margin-bottom:20px}
.title-input::placeholder{color:#C4B9AA}
.body-textarea{width:100%;padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--card);font-size:16px;font-family:'Source Serif 4',Georgia,serif;line-height:1.8;color:var(--text);outline:none;resize:vertical;min-height:280px;margin-bottom:8px}
.body-textarea::placeholder{color:#C4B9AA}
.word-count{font-size:12px;color:var(--text2);margin-bottom:16px}
.audio-note{background:var(--green-light);border-radius:12px;padding:16px;margin-bottom:24px;display:flex;align-items:flex-start;gap:12px}
.audio-note p{font-size:13px;color:var(--green);line-height:1.5;font-weight:500}
.publish-btn{width:100%;padding:16px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-bottom:40px}
.publish-btn.ready{background:var(--accent);color:#fff}
.publish-btn.disabled{background:var(--border);color:var(--text2);cursor:not-allowed}
.success{display:flex;align-items:center;justify-content:center;min-height:70vh;text-align:center}
.success h2{font-family:'Playfair Display',Georgia,serif;font-size:26px;margin-bottom:10px}
.success p{color:var(--text2);font-size:15px;margin-bottom:24px;line-height:1.5}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty h3{font-family:'Playfair Display',Georgia,serif;font-size:20px;margin-bottom:8px;color:var(--text)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .4s ease both}

@media(max-width:480px){
  .featured h2{font-size:20px}
  .reading-view h1{font-size:26px}
  .share-menu button{min-width:100%}
}
</style>
</head>
<body>

<!-- Home View -->
<div id="home-view">
  <div class="container">
    <div class="header">
      <div class="logo">ten<span class="dot">.</span></div>
      <div class="header-actions">
        <button class="btn-outline" onclick="showView('write')">✍🏽 Write</button>
        <a href="index.html" class="btn-outline" style="text-decoration:none">Waitlist</a>
      </div>
    </div>
    <p class="tagline">Stories and ideas for busy people.</p>
    <div id="featured-area"></div>
    <div class="filters" id="filters"></div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<!-- Reading View -->
<div class="reading-view" id="reading-view">
  <div class="container">
    <div class="reading-header">
      <button class="back-btn" onclick="showView('home')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-read" onclick="setMode('read')">📖 Read</button>
        <button class="mode-btn" id="btn-listen" onclick="setMode('listen')">🎧 Listen</button>
      </div>
    </div>
    <div id="reading-content"></div>
  </div>
</div>

<!-- Write View -->
<div class="write-view" id="write-view">
  <div class="container">
    <div class="reading-header">
      <button class="back-btn" onclick="showView('home')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700">Write a Piece</h2>
    </div>
    <div id="write-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="stories.js"></script>
<script>
// ===== STATE =====
var currentView = 'home';
var currentFilter = 'All';
var currentStory = null;
var isPlaying = false;
var audioProgress = 0;
var audioInterval = null;
var audioEl = null;
var likedItems = JSON.parse(localStorage.getItem('ten_likes') || '{}');
var userComments = JSON.parse(localStorage.getItem('ten_comments') || '{}');

// ===== VIEWS =====
function showView(view) {
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('reading-view').style.display = 'none';
  document.getElementById('write-view').style.display = 'none';
  
  if (view === 'home') { document.getElementById('home-view').style.display = 'block'; renderHome(); }
  if (view === 'reading') { document.getElementById('reading-view').style.display = 'block'; renderReading(); }
  if (view === 'write') { document.getElementById('write-view').style.display = 'block'; renderWrite(); }
  
  window.scrollTo(0, 0);
  currentView = view;
}

function openStory(id) {
  currentStory = STORIES.find(function(s) { return s.id === id; });
  stopAudio();
  audioProgress = 0;
  showView('reading');
}

// ===== CATEGORY HELPERS =====
function getCatClass(cat) {
  return cat === 'Story' ? 'cat-story' : cat === 'Learn' ? 'cat-learn' : 'cat-idea';
}

function getCatColor(cat) {
  return cat === 'Story' ? 'var(--accent)' : cat === 'Learn' ? 'var(--green)' : 'var(--purple)';
}

// ===== LIKES =====
function toggleLike(id, ev) {
  if (ev) ev.stopPropagation();
  var story = STORIES.find(function(s) { return s.id === id; });
  if (likedItems[id]) { likedItems[id] = false; story.likes--; }
  else { likedItems[id] = true; story.likes++; }
  localStorage.setItem('ten_likes', JSON.stringify(likedItems));
  if (currentView === 'home') renderHome();
  if (currentView === 'reading' && currentStory && currentStory.id === id) renderReading();
}

// ===== RENDER HOME =====
function renderHome() {
  // Featured
  var ft = STORIES.find(function(s) { return s.featured; });
  if (ft && currentFilter === 'All') {
    var rtF = getReadTime(ft), ltF = getListenTime(ft);
    document.getElementById('featured-area').innerHTML = '<div class="featured fade" onclick="openStory(\'' + ft.id + '\')">' +
      '<div class="featured-glow"></div>' +
      '<div class="featured-badge">⭐ Today\'s Pick</div>' +
      '<h2>' + ft.title + '</h2>' +
      '<div class="author">by ' + ft.author + '</div>' +
      '<div class="excerpt">' + ft.excerpt + '</div>' +
      '<div class="meta"><span class="rm">📖 ' + rtF + ' min</span><span class="lm">🎧 ' + ltF + ' min</span>' +
      '<span class="social"><span>❤️ ' + ft.likes + '</span><span>💬 ' + getAllComments(ft).length + '</span></span></div></div>';
  } else {
    document.getElementById('featured-area').innerHTML = '';
  }

  // Filters
  var filters = ['All', 'Story', 'Learn', 'Idea'];
  document.getElementById('filters').innerHTML = filters.map(function(f) {
    return '<button class="filter ' + (currentFilter === f ? 'active' : '') + '" onclick="currentFilter=\'' + f + '\';renderHome()">' + f + '</button>';
  }).join('');

  // Cards
  var items = STORIES.filter(function(s) {
    return (!s.featured || currentFilter !== 'All') && (currentFilter === 'All' || s.category === currentFilter);
  });
  
  if (items.length === 0) {
    document.getElementById('cards').innerHTML = '<div class="empty"><h3>No stories yet</h3><p>Check back soon or try a different category.</p></div>';
    return;
  }

  document.getElementById('cards').innerHTML = items.map(function(s, i) {
    var rt = getReadTime(s), lt = getListenTime(s);
    var lk = likedItems[s.id];
    var allComments = getAllComments(s);
    return '<div class="card fade" style="animation-delay:' + (i * 60) + 'ms" onclick="openStory(\'' + s.id + '\')">' +
      '<div class="card-top"><span class="cat ' + getCatClass(s.category) + '">' + s.category + '</span></div>' +
      '<h3>' + s.title + '</h3>' +
      '<div class="author">by ' + s.author + '</div>' +
      '<div class="excerpt">' + s.excerpt + '</div>' +
      '<div class="card-meta">' +
      '<span class="rm">📖 ' + rt + ' min</span>' +
      '<span class="lm">🎧 ' + lt + ' min</span>' +
      '<span class="engagement">' +
      '<button class="like-btn ' + (lk ? 'liked' : '') + '" onclick="toggleLike(\'' + s.id + '\',event)">' + (lk ? '❤️' : '🤍') + ' ' + s.likes + '</button>' +
      '<span>💬 ' + allComments.length + '</span></span></div></div>';
  }).join('');
}

// ===== COMMENTS =====
function getAllComments(story) {
  var base = story.comments || [];
  var user = userComments[story.id] || [];
  return base.concat(user);
}

function addComment() {
  var input = document.getElementById('comment-input');
  var text = input.value.trim();
  if (!text || !currentStory) return;
  
  if (!userComments[currentStory.id]) userComments[currentStory.id] = [];
  userComments[currentStory.id].push({ name: "You", color: "#1A1A1A", time: "Just now", text: text });
  localStorage.setItem('ten_comments', JSON.stringify(userComments));
  
  renderReading();
  setTimeout(function() { document.getElementById('comments-section').scrollIntoView({ behavior: 'smooth' }); }, 100);
}

// ===== RENDER READING =====
function renderReading() {
  if (!currentStory) return;
  var s = currentStory;
  var rt = getReadTime(s), lt = getListenTime(s);
  var lk = likedItems[s.id];
  var allComments = getAllComments(s);
  
  var bodyHtml = s.body.split('\n\n').map(function(p) { return '<p>' + p + '</p>'; }).join('');
  
  var commentsHtml = allComments.map(function(c) {
    return '<div class="comment">' +
      '<div class="comment-avatar" style="background:' + c.color + '">' + c.name.charAt(0) + '</div>' +
      '<div class="comment-body">' +
      '<span class="comment-name">' + c.name + '</span><span class="comment-time">' + c.time + '</span>' +
      '<div class="comment-text">' + c.text + '</div>' +
      '<div class="comment-actions"><button>❤️ Like</button><button>Reply</button></div>' +
      '</div></div>';
  }).join('');

  document.getElementById('reading-content').innerHTML =
    '<div class="reading-tags"><span class="cat ' + getCatClass(s.category) + '">' + s.category + '</span>' +
    s.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
    '<h1>' + s.title + '</h1>' +
    '<div class="reading-author">by ' + s.author + '</div>' +
    '<div class="reading-meta"><span>📖 ' + rt + ' min</span><span class="lm">🎧 ' + lt + ' min</span></div>' +
    '<div class="social-bar">' +
    '<button onclick="toggleLike(\'' + s.id + '\')" class="' + (lk ? 'liked' : '') + '">' + (lk ? '❤️' : '🤍') + ' <span class="ct">' + s.likes + ' likes</span></button>' +
    '<button onclick="document.getElementById(\'comments-section\').scrollIntoView({behavior:\'smooth\'})">💬 <span class="ct">' + allComments.length + ' comments</span></button>' +
    '<button onclick="toggleShare()">🔗 Share</button></div>' +
    '<div class="share-menu" id="share-menu"></div>' +
    '<div class="audio-player" id="audio-player">' +
    '<button class="play-btn" onclick="toggleAudio()"><svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>' +
    '<div class="progress-wrap"><div class="progress-track" onclick="seekAudio(event)"><div class="progress-fill" id="progress-fill"></div></div>' +
    '<div class="progress-times"><span id="time-current">0:00</span><span>' + lt + ':00</span></div></div></div>' +
    '<div class="reading-body">' + bodyHtml + '</div>' +
    '<div class="comments-section" id="comments-section">' +
    '<div class="comments-header">Comments <span>(' + allComments.length + ')</span></div>' +
    commentsHtml +
    '<div class="add-comment"><input id="comment-input" placeholder="Add a comment..." onkeydown="if(event.key===\'Enter\')addComment()">' +
    '<button onclick="addComment()">Post</button></div></div>';

  setMode('read');
}

// ===== AUDIO =====
function setMode(mode) {
  var rb = document.getElementById('btn-read');
  var lb = document.getElementById('btn-listen');
  var player = document.getElementById('audio-player');
  
  if (mode === 'read') {
    rb.className = 'mode-btn active'; lb.className = 'mode-btn';
    if (player) player.style.display = 'none';
    stopAudio();
  } else {
    rb.className = 'mode-btn'; lb.className = 'mode-btn active';
    if (player) player.style.display = 'flex';
    
    // If there's a real audio URL, use it
    if (currentStory && currentStory.audioUrl) {
      if (!audioEl) audioEl = new Audio();
      audioEl.src = currentStory.audioUrl;
      audioEl.play();
      isPlaying = true;
      updatePlayIcon();
      audioEl.ontimeupdate = function() {
        var pct = (audioEl.currentTime / audioEl.duration) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('time-current').textContent = formatTime(audioEl.currentTime);
      };
    } else {
      startSimAudio();
    }
  }
}

function toggleAudio() { if (isPlaying) stopAudio(); else { if (currentStory && currentStory.audioUrl) { audioEl.play(); isPlaying = true; updatePlayIcon(); } else startSimAudio(); } }

function startSimAudio() {
  isPlaying = true; updatePlayIcon();
  if (audioInterval) clearInterval(audioInterval);
  var total = getListenTime(currentStory) * 60;
  audioInterval = setInterval(function() {
    audioProgress++;
    if (audioProgress >= total) { stopAudio(); audioProgress = total; }
    var el = document.getElementById('progress-fill');
    if (el) el.style.width = (audioProgress / total * 100) + '%';
    var tc = document.getElementById('time-current');
    if (tc) tc.textContent = formatTime(audioProgress);
  }, 1000);
}

function stopAudio() {
  isPlaying = false; updatePlayIcon();
  if (audioInterval) { clearInterval(audioInterval); audioInterval = null; }
  if (audioEl) { audioEl.pause(); }
}

function seekAudio(ev) {
  var rect = ev.currentTarget.getBoundingClientRect();
  var pct = (ev.clientX - rect.left) / rect.width;
  if (currentStory && currentStory.audioUrl && audioEl) {
    audioEl.currentTime = pct * audioEl.duration;
  } else {
    audioProgress = Math.floor(pct * getListenTime(currentStory) * 60);
  }
}

function formatTime(s) { var m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

function updatePlayIcon() {
  var el = document.getElementById('play-icon');
  if (!el) return;
  el.innerHTML = isPlaying ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>' : '<polygon points="5,3 19,12 5,21"/>';
}

// ===== SHARING =====

    '<button onclick="window.open(\'https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText + ' ' + url)+'\',\'_blank\');toggleShare()"><svg width="16" height="16" viewBox="0 0 24 24" fill="#1A1A1A"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> Post on X</button>' +
    '<button onclick="window.open(\'https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url)+'\',\'_blank\');toggleShare()"><svg width="16" height="16" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.064 2.064 0 110-4.128 2.064 2.064 0 010 4.128zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0z"/></svg> LinkedIn</button>' +
    '<button onclick="copyText(\'tiktok\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="#1A1A1A"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.46v-7.15a8.16 8.16 0 005.58 2.18v-3.45a4.85 4.85 0 01-3.77-1.78z"/></svg> TikTok</button>' +
    '<button onclick="copyText(\'instagram\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="#E1306C"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919C8.416 2.175 8.796 2.163 12 2.163zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12s.014 3.668.072 4.948c.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24s3.668-.014 4.948-.072c4.354-.2 6.782-2.618 6.979-6.98C23.986 15.668 24 15.259 24 12s-.014-3.667-.072-4.947c-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg> Instagram</button>' +
    '<button onclick="copyLink()">📋 Copy link</button>';
  m.classList.add('open');
}

function copyText(platform) {
  var s = currentStory;
  var text = 'I just read "' + s.title + '" by ' + s.author + ' on Ten. — ' + getReadTime(s) + ' min read with built-in audio. Check it out: ' + window.location.href;
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied! Paste it on ' + platform.charAt(0).toUpperCase() + platform.slice(1));
    toggleShare();
  });
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    showToast('Link copied!');
    toggleShare();
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ===== WRITE =====
var writeCat = 'Story';

function renderWrite() {
  document.getElementById('write-content').innerHTML =
    '<p class="write-desc">Share a story, lesson, or idea. Keep it under 15 minutes — we\'ll auto-generate the audio for you.</p>' +
    '<label class="cat-label">Category</label>' +
    '<div class="cat-btns" id="cat-btns"></div>' +
    '<input class="title-input" id="write-title" placeholder="Title" oninput="updatePublish()">' +
    '<textarea class="body-textarea" id="write-body" placeholder="Start writing your story, lesson, or idea..." oninput="updatePublish()"></textarea>' +
    '<div class="word-count" id="word-count"></div>' +
    '<div class="audio-note"><span style="color:var(--green)">🎧</span><p>Audio will be auto-generated when you publish. Your piece will be available to both readers and listeners.</p></div>' +
    '<button class="publish-btn disabled" id="publish-btn" onclick="submitWrite()">Publish</button>';
  renderCatBtns('Story');
}

function renderCatBtns(sel) {
  writeCat = sel;
  document.getElementById('cat-btns').innerHTML = ['Story', 'Learn', 'Idea'].map(function(c) {
    var active = c === sel;
    var color = getCatColor(c);
    var bgMap = { Story: '#FDF2E9', Learn: '#E9F5F0', Idea: '#F0ECF9' };
    return '<button class="cat-btn" style="border:2px solid ' + (active ? color : 'var(--border)') + ';background:' + (active ? bgMap[c] : 'transparent') + ';color:' + (active ? color : 'var(--text2)') + '" onclick="renderCatBtns(\'' + c + '\')">' + c + '</button>';
  }).join('');
}

function updatePublish() {
  var t = document.getElementById('write-title').value;
  var b = document.getElementById('write-body').value;
  var btn = document.getElementById('publish-btn');
  var wc = document.getElementById('word-count');
  if (b.trim()) {
    var words = b.trim().split(/\s+/).length;
    wc.textContent = '~' + Math.max(1, Math.round(words / 200)) + ' min read · ~' + Math.max(1, Math.round(words / 240)) + ' min listen';
  } else { wc.textContent = ''; }
  btn.className = (t.trim() && b.trim()) ? 'publish-btn ready' : 'publish-btn disabled';
}

function submitWrite() {
  var t = document.getElementById('write-title').value;
  var b = document.getElementById('write-body').value;
  if (!t.trim() || !b.trim()) return;
  
  // In the real MVP, this would submit to your backend/Airtable
  // For now, show success
  document.getElementById('write-content').innerHTML =
    '<div class="success"><div>' +
    '<div style="width:72px;height:72px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px">✓</div>' +
    '<h2>Story Submitted</h2>' +
    '<p>Audio will be auto-generated.<br>Your piece will be reviewed and published soon.</p>' +
    '<button class="btn-solid" style="padding:14px 32px;font-size:15px;border-radius:12px" onclick="showView(\'home\')">Back to Home</button>' +
    '</div></div>';
}
